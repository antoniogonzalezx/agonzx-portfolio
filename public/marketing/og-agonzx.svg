<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <!--
    Open-Graph image for agonzx.dev links · minimalist.
    Same composition as the LinkedIn banner, scaled to the 1200×630
    spec used by LinkedIn / X / Slack / WhatsApp link unfurls.
    Navy ground, name + role centred-left, agonz{x} wordmark top-right.
  -->
  <rect width="1200" height="630" fill="#0B0F1A"/>

  <!-- Wordmark agonz{x} · top-right corner -->
  <text
    x="1110"
    y="92"
    text-anchor="end"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="46"
    font-weight="700"
    letter-spacing="-1.8"
  >
    <tspan fill="#E8ECF7">agonz</tspan><tspan fill="#6B6BFF">{x}</tspan>
  </text>

  <!-- Center-left lockup · name + role -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="-2.4">
    <text x="90" y="334" font-size="78" font-weight="700" fill="#E8ECF7">
      Antonio González Valdepeñas
    </text>
    <text x="90" y="402" font-size="42" font-weight="400" fill="#A8B3D1" letter-spacing="-0.8">
      iOS Engineer
    </text>
  </g>
</svg>
