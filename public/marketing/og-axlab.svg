<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" preserveAspectRatio="xMidYMid meet">
  <!--
    Open-Graph image for axlab.es links · minimalist.
    Light ground, single line "Software a medida." centred-left,
    a{x}lab wordmark in the top-right corner.  Indigo `{x}` reads as
    one shape — braces and x share the same fill.
  -->
  <rect width="1200" height="630" fill="#FAFBFD"/>

  <!-- Wordmark a{x}lab · top-right corner -->
  <text
    x="1110"
    y="92"
    text-anchor="end"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="46"
    font-weight="700"
    letter-spacing="-1.8"
  >
    <tspan fill="#23335C">a</tspan><tspan fill="#4F4FFF">{x}</tspan><tspan fill="#23335C">lab</tspan>
  </text>

  <!-- Center-left headline -->
  <text
    x="90"
    y="358"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="92"
    font-weight="700"
    fill="#23335C"
    letter-spacing="-2.8"
  >
    Software a medida.
  </text>
</svg>
