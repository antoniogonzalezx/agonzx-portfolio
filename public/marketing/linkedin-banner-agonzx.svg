<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" preserveAspectRatio="xMidYMid meet">
  <!--
    LinkedIn personal banner — agonzx · minimalist composition.
    Navy ground, name + role centred-left, agonz{x} wordmark in the
    top-right corner.  No extra copy, no gradients on the mark — the
    `{x}` reads as one indigo shape (braces + x same fill).
  -->
  <rect width="1584" height="396" fill="#0B0F1A"/>

  <!-- Wordmark agonz{x} · top-right corner.  Both `agonz` and `{x}` use
       Inter so the text travels intact wherever this SVG is opened;
       `{x}` is rendered as the three glyph characters in one indigo run
       so brackets and x share the exact same colour. -->
  <text
    x="1474"
    y="80"
    text-anchor="end"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-1.6"
  >
    <tspan fill="#E8ECF7">agonz</tspan><tspan fill="#6B6BFF">{x}</tspan>
  </text>

  <!-- Center-left lockup · name + role -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="-2">
    <text x="110" y="208" font-size="68" font-weight="700" fill="#E8ECF7">
      Antonio González Valdepeñas
    </text>
    <text x="110" y="262" font-size="36" font-weight="400" fill="#A8B3D1" letter-spacing="-0.6">
      iOS Engineer
    </text>
  </g>
</svg>
