<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396" preserveAspectRatio="xMidYMid meet">
  <!--
    LinkedIn page banner — axlab studio · minimalist composition.
    Paper-light ground, single line "Software a medida" centred-left,
    a{x}lab wordmark in the top-right corner.  Indigo `{x}` reads as
    one shape — braces and x share the same fill.
  -->
  <rect width="1584" height="396" fill="#FAFBFD"/>

  <!-- Wordmark a{x}lab · top-right corner -->
  <text
    x="1474"
    y="80"
    text-anchor="end"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="42"
    font-weight="700"
    letter-spacing="-1.6"
  >
    <tspan fill="#23335C">a</tspan><tspan fill="#4F4FFF">{x}</tspan><tspan fill="#23335C">lab</tspan>
  </text>

  <!-- Center-left headline -->
  <text
    x="110"
    y="232"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="78"
    font-weight="700"
    fill="#23335C"
    letter-spacing="-2.4"
  >
    Software a medida.
  </text>
</svg>
